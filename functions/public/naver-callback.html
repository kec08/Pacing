<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pacing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f8f8f8;
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    max-width: 320px;
    width: 90%;
  }
  .icon {
    width: 64px;
    height: 64px;
    background: #00C73C;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .app-name {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    margin-bottom: 8px;
  }
  .message {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e0e0e0;
    border-top-color: #00C73C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #e74c3c; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🏃</div>
  <div class="app-name">Pacing</div>
  <div class="message" id="msg">네이버 로그인 처리 중이에요.<br>잠시만 기다려주세요.</div>
  <div class="spinner" id="spinner"></div>
</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  if (code && state) {
    setTimeout(function() {
      window.location.href = 'naverPacing://oauth?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
    }, 300);
  } else {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').innerHTML = '<span class="error">오류가 발생했습니다.<br>앱으로 돌아가 다시 시도해주세요.</span>';
  }
</script>
</body>
</html>
